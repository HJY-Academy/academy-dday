<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hajiyoung Academy D-Day Scheduler</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FA; min-height: 100vh; }
        .milestone-active { border-left-width: 6px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    </style>
</head>
<body class="antialiased text-slate-900 pb-24">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const calculateDDay = (targetDate) => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(targetDate);
            target.setHours(0, 0, 0, 0);
            const diffTime = target.getTime() - today.getTime();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return { text: 'D-Day', diff: 0 };
            return diffDays > 0 ? { text: `D-${diffDays}`, diff: diffDays } : { text: `D+${Math.abs(diffDays)}`, diff: diffDays };
        };

        const App = () => {
            const [schedules, setSchedules] = useState([]);
            const [title, setTitle] = useState('');
            const [date, setDate] = useState('');

            useEffect(() => {
                const saved = localStorage.getItem('hajiyoung-scheduler-v2-preview');
                if (saved) setSchedules(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('hajiyoung-scheduler-v2-preview', JSON.stringify(schedules));
            }, [schedules]);

            const addSchedule = (e) => {
                e.preventDefault();
                if (!title || !date) return;
                setSchedules([...schedules, { id: Date.now().toString(), title, date }]);
                setTitle(''); setDate('');
            };

            const deleteSchedule = (id) => setSchedules(schedules.filter(s => s.id !== id));
            const sortedSchedules = useMemo(() => [...schedules].sort((a, b) => new Date(a.date) - new Date(b.date)), [schedules]);

            return (
                <div className="max-w-md mx-auto min-h-screen">
                    {/* Header */}
                    <header className="bg-white px-6 py-6 flex items-center gap-3 border-b border-slate-100 sticky top-0 z-20 shadow-sm">
                        <div className="bg-blue-600 p-2 rounded-xl shadow-blue-200 shadow-xl">
                            <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
                        </div>
                        <h1 className="text-[18px] font-black text-[#1A73E8] leading-[1.1]">
                            Hajiyoung Academy <br /> D-Day Scheduler
                        </h1>
                    </header>

                    <main className="px-6 pt-10">
                        {/* Hero */}
                        <div className="mb-10 animate-up">
                            <h2 className="text-[34px] font-black tracking-tight text-slate-800 leading-[1.1] mb-3">Academic <br /> Momentum</h2>
                            <p className="text-slate-400 text-sm font-medium pr-10">Stay ahead of your academic goals with editorial precision and scholastic flow.</p>
                        </div>

                        {/* Form Card */}
                        <div className="bg-white rounded-[32px] p-8 shadow-xl shadow-slate-200/50 border border-slate-50 mb-10">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="w-1.5 h-6 bg-[#1A73E8] rounded-full"></div>
                                <h3 className="text-[12px] font-black text-[#1A73E8] tracking-widest uppercase">NEW SCHEDULE</h3>
                            </div>
                            <form onSubmit={addSchedule} className="space-y-6">
                                <div>
                                    <label className="block text-[10px] font-black text-slate-400 tracking-widest mb-2 uppercase">DESCRIPTION</label>
                                    <input type="text" placeholder="새 일정을 입력하세요" className="w-full h-14 bg-slate-100 border-none rounded-2xl px-5 font-bold text-slate-700" value={title} onChange={e => setTitle(e.target.value)} required />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-black text-slate-400 tracking-widest mb-2 uppercase">TARGET DATE</label>
                                    <input type="date" className="w-full h-14 bg-slate-100 border-none rounded-2xl px-5 font-bold text-slate-600" value={date} onChange={e => setDate(e.target.value)} required />
                                </div>
                                <button type="submit" className="w-full h-16 bg-[#1A73E8] hover:bg-blue-700 text-white font-black text-lg rounded-2xl shadow-xl shadow-blue-200 transition-all active:scale-95">추가 +</button>
                            </form>
                        </div>

                        {/* List Area */}
                        <div className="mb-10">
                            <div className="flex items-center justify-between mb-6">
                                <h3 className="text-[12px] font-black text-slate-700 tracking-widest uppercase">ACTIVE MILESTONES</h3>
                                <span className="bg-cyan-100 text-cyan-600 text-[10px] font-black px-3 py-1 rounded-full">{schedules.length} TOTAL</span>
                            </div>
                            <div className="space-y-4">
                                {sortedSchedules.map(s => {
                                    const { text, diff } = calculateDDay(s.date);
                                    const isPast = diff < 0; const isDDay = diff === 0;
                                    return (
                                        <div key={s.id} className="bg-white rounded-[28px] overflow-hidden flex shadow-sm border border-slate-50 h-28">
                                            <div className={`w-2 ${isDDay ? 'bg-red-500' : isPast ? 'bg-slate-200' : 'bg-emerald-600'}`}></div>
                                            <div className="flex-1 flex items-center px-4">
                                                <div className="w-24 border-r border-slate-50 pr-2">
                                                    <p className="text-[9px] font-black text-slate-400 tracking-widest">{isDDay ? 'ENERGY' : isPast ? 'COMPLETED' : 'REMAINING'}</p>
                                                    <p className={`text-2xl font-black ${isDDay ? 'text-red-600' : isPast ? 'text-slate-300' : 'text-blue-600'}`}>{text}</p>
                                                </div>
                                                <div className="flex-1 pl-4 relative">
                                                    <h4 className={`font-bold text-lg leading-tight mb-1 truncate ${isPast ? 'text-slate-300' : 'text-slate-800'}`}>{s.title}</h4>
                                                    <p className="text-[10px] font-semibold text-slate-400">{s.date}</p>
                                                    <button onClick={() => deleteSchedule(s.id)} className="absolute right-0 top-1/2 -translate-y-1/2 text-slate-200 hover:text-red-400">✕</button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Progress */}
                        <div className="bg-blue-800 rounded-[32px] p-8 text-white mb-10 overflow-hidden relative shadow-2xl shadow-blue-200">
                            <p className="text-[10px] font-black tracking-widest opacity-60 uppercase mb-1">SEASON PROGRESS</p>
                            <p className="text-5xl font-black mb-4">64%</p>
                            <div className="h-2 bg-blue-900/50 rounded-full overflow-hidden">
                                <div className="h-full bg-cyan-400 rounded-full" style={{width: '64%'}}></div>
                            </div>
                            <div className="absolute top-10 right-10 opacity-10 transform scale-150 rotate-12">
                                <svg className="w-20 h-20" fill="currentColor" viewBox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
                            </div>
                        </div>

                        {/* Insight */}
                        <div className="bg-slate-200 rounded-[32px] p-10 text-center mb-10 relative">
                            <div className="absolute -top-6 left-1/2 -translate-x-1/2 w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-lg">💡</div>
                            <h4 className="font-black mb-2 mt-2">Daily Insight</h4>
                            <p className="text-slate-500 italic text-sm font-medium">"Focus on progress, not perfection. Every milestone counts."</p>
                        </div>
                    </main>

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center">
                        <div className="flex flex-col items-center gap-1">
                            <div className="bg-cyan-100 p-3 rounded-2xl text-blue-600">📅</div>
                            <span className="text-[9px] font-black text-blue-600 tracking-widest">SCHEDULES</span>
                        </div>
                        <div className="flex flex-col items-center gap-1 opacity-30">
                            <div className="p-3">🔔</div>
                            <span className="text-[9px] font-black tracking-widest">CALENDAR</span>
                        </div>
                        <div className="flex flex-col items-center gap-1 opacity-30">
                            <div className="p-3">⚙️</div>
                            <span className="text-[9px] font-black tracking-widest">SETTINGS</span>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
